services:
  contract-guard:
    build: .
    environment:
      CONTRACT_DIRECTORY: /app/contracts
    ports:
      - "18081:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 3s
      retries: 5
