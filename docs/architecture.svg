<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="550"
    viewBox="0 0 1360 550" role="img" aria-labelledby="diagram-title diagram-description">
    <title id="diagram-title">Поток проверки контракта события</title>
    <desc id="diagram-description">Событие валидируется по JSON Schema, публикуется в output или quarantine, после подтверждения публикации коммитится исходный offset.</desc>
    <defs>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
        <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0F172A" flood-opacity="0.08"/>
      </filter>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3"
        orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#64748B"/>
      </marker>
      <style>
        text { font-family: Inter, "Segoe UI", Arial, sans-serif; fill: #0F172A; }
        .label { font-size: 13px; font-weight: 600; letter-spacing: 0.08em; fill: #64748B; }
        .title { font-size: 19px; font-weight: 600; }
        .detail { font-size: 15px; fill: #475569; }
        .step { font-size: 13px; font-weight: 700; fill: #FFFFFF; }
        .arrow { fill: none; stroke: #64748B; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
        .edge-label { font-size: 13px; font-weight: 500; fill: #64748B; }
        .lane-label { font-size: 14px; font-weight: 700; letter-spacing: 0.08em; fill: #475569; }
      </style>
    </defs>
    <rect x="1" y="1" width="1358" height="548" rx="24"
      fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>

      <text x="35" y="54" class="lane-label">БЕЗОПАСНАЯ ОБРАБОТКА OFFSET</text>
      <path d="M 265 157 L 300 157" class="arrow" marker-end="url(#arrow)"/><path d="M 530 157 L 565 157" class="arrow" marker-end="url(#arrow)"/><path d="M 795 157 L 830 157" class="arrow" marker-end="url(#arrow)"/><path d="M 1060 157 L 1095 157" class="arrow" marker-end="url(#arrow)"/>

    <g>
      <rect x="35" y="90" width="230" height="135" rx="16"
        fill="#EFF6FF" stroke="#93C5FD" stroke-width="2" filter="url(#shadow)"/>
      <circle cx="63" cy="118" r="14" fill="#2563EB"/>
         <text x="63" y="123" class="step" text-anchor="middle">1</text>
      <text x="87" y="120" class="label">INPUT</text>
      <text x="59" y="155" class="title" text-anchor="start"><tspan x="59" dy="0">Kafka event</tspan></text>
      <text x="59" y="191" class="detail" text-anchor="start"><tspan x="59" dy="0">Payload и offset</tspan></text>
    </g>

    <g>
      <rect x="300" y="90" width="230" height="135" rx="16"
        fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2" filter="url(#shadow)"/>
      <circle cx="328" cy="118" r="14" fill="#7C3AED"/>
         <text x="328" y="123" class="step" text-anchor="middle">2</text>
      <text x="352" y="120" class="label">VALIDATION</text>
      <text x="324" y="155" class="title" text-anchor="start"><tspan x="324" dy="0">Contract Guard</tspan></text>
      <text x="324" y="191" class="detail" text-anchor="start"><tspan x="324" dy="0">JSON Schema contract</tspan></text>
    </g>

    <g>
      <rect x="565" y="90" width="230" height="135" rx="16"
        fill="#FFF7ED" stroke="#FDBA74" stroke-width="2" filter="url(#shadow)"/>
      <circle cx="593" cy="118" r="14" fill="#EA580C"/>
         <text x="593" y="123" class="step" text-anchor="middle">3</text>
      <text x="617" y="120" class="label">ROUTING</text>
      <text x="589" y="155" class="title" text-anchor="start"><tspan x="589" dy="0">Output / quarantine</tspan></text>
      <text x="589" y="191" class="detail" text-anchor="start"><tspan x="589" dy="0">Payload и причина</tspan></text>
    </g>

    <g>
      <rect x="830" y="90" width="230" height="135" rx="16"
        fill="#ECFDF5" stroke="#6EE7B7" stroke-width="2" filter="url(#shadow)"/>
      <circle cx="858" cy="118" r="14" fill="#059669"/>
         <text x="858" y="123" class="step" text-anchor="middle">4</text>
      <text x="882" y="120" class="label">DELIVERY</text>
      <text x="854" y="155" class="title" text-anchor="start"><tspan x="854" dy="0">Producer flush</tspan></text>
      <text x="854" y="191" class="detail" text-anchor="start"><tspan x="854" dy="0">Публикация подтверждена</tspan></text>
    </g>

    <g>
      <rect x="1095" y="90" width="230" height="135" rx="16"
        fill="#ECFDF5" stroke="#6EE7B7" stroke-width="2" filter="url(#shadow)"/>
      <circle cx="1123" cy="118" r="14" fill="#059669"/>
         <text x="1123" y="123" class="step" text-anchor="middle">5</text>
      <text x="1147" y="120" class="label">COMMIT</text>
      <text x="1119" y="155" class="title" text-anchor="start"><tspan x="1119" dy="0">Исходный offset</tspan></text>
      <text x="1119" y="191" class="detail" text-anchor="start"><tspan x="1119" dy="0">Только после publish</tspan></text>
    </g>


    <g>
      <rect x="300" y="350" width="230" height="130" rx="16"
        fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>

      <text x="324" y="380" class="label">GOVERNANCE</text>
      <text x="324" y="415" class="title" text-anchor="start"><tspan x="324" dy="0">Версии контрактов</tspan></text>
      <text x="324" y="451" class="detail" text-anchor="start"><tspan x="324" dy="0">Владелец и compatibility</tspan></text>
    </g>

    <g>
      <rect x="565" y="350" width="230" height="130" rx="16"
        fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>

      <text x="589" y="380" class="label">OBSERVABILITY</text>
      <text x="589" y="415" class="title" text-anchor="start"><tspan x="589" dy="0">Prometheus metrics</tspan></text>
      <text x="589" y="451" class="detail" text-anchor="start"><tspan x="589" dy="0">Принято и отклонено</tspan></text>
    </g>
      <path d="M 415 225 L 415 350" class="arrow" stroke-dasharray="7 7" marker-end="url(#arrow)"/>
      <path d="M 680 225 L 680 350" class="arrow" stroke-dasharray="7 7" marker-end="url(#arrow)"/>

  </svg>